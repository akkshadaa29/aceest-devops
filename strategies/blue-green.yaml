apiVersion: v1
kind: List
items:
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: aceest-blue
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: aceest
        version: blue
    template:
      metadata:
        labels:
          app: aceest
          version: blue
      spec:
        containers:
        - name: app
          image: aceest-app:latest
          imagePullPolicy: Never

- apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: aceest-green
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: aceest
        version: green
    template:
      metadata:
        labels:
          app: aceest
          version: green
      spec:
        containers:
        - name: app
          image: aceest-app:latest
          imagePullPolicy: Never
