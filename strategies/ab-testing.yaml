apiVersion: v1
kind: List
items:
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: aceest-a
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: aceest
        version: a
    template:
      metadata:
        labels:
          app: aceest
          version: a
      spec:
        containers:
        - name: app
          image: aceest-app:latest
          imagePullPolicy: Never

- apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: aceest-b
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: aceest
        version: b
    template:
      metadata:
        labels:
          app: aceest
          version: b
      spec:
        containers:
        - name: app
          image: aceest-app:latest
          imagePullPolicy: Never
