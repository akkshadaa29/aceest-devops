apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-shadow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest
      version: shadow
  template:
    metadata:
      labels:
        app: aceest
        version: shadow
    spec:
      containers:
      - name: app
        image: aceest-app:latest
